<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css" />    
  <script src="js/script.js"></script>
  <title>Random User Generator</title>
</head>
<body>
  <div>
      <!-- Navigation -->    
      <!-- TODO -->
 <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">User App</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
        </ul>
      </div>
      </div>

      <!-- Header -->
      <div>
        <h1>CSCI 3342 Midterm Exam</h1>
        <h2>Random User Generator</h2>
      </div>
      
      
      <!-- Main Content: Profile Card -->    
      <div class="profile-container">
        <div class="profile">
          <div class="image">
            <img src="./images/user.jpg" />
          </div>
          <div class="details">
            <p>Name: <span id="name">Full name</span></p>
            <p>Email:
              <span id="email">email@gmail.com</span>
            </p>
            <p>Location: <span id="address">Edinburg, TX</span></p>
            <p>Age: <span id="age">30</span></p>
          </div>
        </div>
      </div>
      

      <!-- Next Button -->
      <div class="next">
        <button id="next-btn" class="relative bg-black text-white px-4 py-2 rounded w-full my-4">
          Next Profile
        </button>
      </div>
      
  </div>  
</body>
</html>
